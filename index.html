<!DOCTYPE html>
<html>
<head>
  <title>Incoming Call...</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      text-align: center;
    }

    #incoming, #callScreen {
      display: none;
    }

    #incoming {
      display: block;
      margin-top: 150px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border-radius: 50px;
      border: none;
      margin: 10px;
      cursor: pointer;
    }

    #accept {
      background: green;
      color: white;
    }

    #decline {
      background: red;
      color: white;
    }

    #callScreen img {
      width: 320px;
      border-radius: 20px;
      margin-top: 40px;
      filter: brightness(1.05) contrast(1.1) saturate(1.1);
    }

    #dialogue {
      margin-top: 20px;
      font-size: 22px;
      padding: 20px;
    }
  </style>
</head>

<body>

<div id="incoming">
  <h1>Incoming Call...</h1>
  <h2>Supreme Leader 👤</h2>
  <button id="accept" onclick="startCall()">Accept</button>
  <button id="decline">Decline</button>
</div>

<div id="callScreen">
  <img src="leader.png" alt="Leader">
  <div id="dialogue">Connecting...</div>
</div>

<script>
let dialogues = [
  "So… you finally picked up.",
  "Where have you been? I have been waiting for you.",
  "I have been watching you.",
  "Do you think you can escape?",
  "Interesting choice…",
  "We will meet soon."
];

let i = 0;

function startCall() {
  document.getElementById("incoming").style.display = "none";
  document.getElementById("callScreen").style.display = "block";

  setTimeout(runDialogue, 2000);
}

function speak(text) {
  let speech = new SpeechSynthesisUtterance(text);
  speech.rate = 0.85;
  speech.pitch = 0.75;
  speech.lang = "en-US";
  speechSynthesis.speak(speech);
}
function runDialogue() {
  if (i < dialogues.length) {
    let text = dialogues[i];
    document.getElementById("dialogue").innerText = text;
    speak(text);
    i++;
    setTimeout(runDialogue, 5000); // ⏳ now 5 sec
  }
}
</script>

</body>
</html>
