<!DOCTYPE html>
<html>
<head>
  <title>Important Question 💖</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to bottom, #ffe6f0, #ffccdd);
      margin-top: 100px;
      overflow: hidden;
    }

    h1 {
      color: #ff4d88;
      font-size: 28px;
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      margin: 10px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
    }

    #yes {
      background-color: #ff4d88;
      color: white;
    }

    #no {
      background-color: #999;
      color: white;
      position: absolute;
    }

    .heart {
      position: absolute;
      color: #ff4d88;
      animation: float 6s linear infinite;
      font-size: 20px;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

<h1 id="question">Will you be my date forever? 😌💖</h1>

<button id="yes" onclick="nextStep()">Yes 💖</button>
<button id="no" onmouseover="moveNo()">No 🙄</button>

<script>
let step = 0;

let questions = [
  "Will you be my date forever? 😌💖",
  "Okay… next question 😏",
  "Can I meet you today? 😌👉👈",
  "Think carefully before answering 👀",
  "Final answer?? 😤",
  "Okay you're mine now Udbhav 💅✨"
];

let noTexts = [
  "Udbhav you can’t escape babyyyy 😏",
  "Wrong answer 😤",
  "Think again 🤨",
  "Stop lying 😭",
  "Bro even I know that's false 💀",
  "बस कर 😭 press YES"
];

let noIndex = 0;

function moveNo() {
  let button = document.getElementById("no");
  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 100);
  button.style.left = x + "px";
  button.style.top = y + "px";

  document.getElementById("question").innerText = noTexts[noIndex % noTexts.length];
  noIndex++;
}

function nextStep() {
  step++;
  if (step < questions.length) {
    document.getElementById("question").innerText = questions[step];
  }
}
</script>

<script>
function createHeart() {
  let heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerText = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 15) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
